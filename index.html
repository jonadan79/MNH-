<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>일일 업무 보고</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#F2EEE3; --card:#FBFAF5; --ink:#1B1A17;
    --sub:#6E6A5E; --line:#DAD3C2; --accent:#C8472E; --sage:#6B7A5E;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:'Hahmlet','Noto Serif KR',Georgia,serif;
    min-height:100vh; min-height:100dvh;
  }
  .wrap{ max-width:680px; margin:0 auto; }
  .gate{ max-width:440px; margin:11vh auto 0; padding:0 24px; }
  .eyebrow{ font-family:'Noto Sans KR',sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--accent); font-weight:700; }
  h1{ font-family:'Hahmlet',serif; font-weight:700; }
  .lead{ color:var(--sub); font-size:15px; line-height:1.6; }
  input,textarea{
    width:100%; font-family:'Noto Sans KR',sans-serif; color:var(--ink);
    background:var(--card); border:1px solid var(--line); border-radius:10px;
  }
  input{ padding:14px 16px; font-size:16px; }
  textarea{ padding:16px; font-size:15px; line-height:1.65; min-height:220px; resize:vertical; }
  textarea:focus,input:focus{ outline:none; border-color:var(--accent); }
  button{ cursor:pointer; font-family:'Noto Sans KR',sans-serif; }
  .btn{
    margin-top:14px; padding:12px 22px; background:var(--ink); color:var(--paper);
    border:none; border-radius:10px; font-size:14px; font-weight:700;
  }
  .btn:disabled{ opacity:.45; cursor:default; }
  .btn-block{ width:100%; }
  .textbtn{ background:none; border:none; color:var(--accent); font-size:12.5px; font-weight:500; padding:2px 0; }
  header.app{ display:flex; justify-content:space-between; align-items:flex-start; padding:28px 24px 18px; }
  .hname{ font-family:'Hahmlet',serif; font-weight:700; font-size:22px; line-height:1.1; }
  .datebar{ display:flex; justify-content:space-between; align-items:center; padding:8px 24px 16px; border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .dlabel{ font-family:'Hahmlet',serif; font-weight:700; font-size:17px; }
  .arrow{ background:none; border:1px solid var(--line); border-radius:8px; width:38px; height:38px; font-size:20px; color:var(--ink); line-height:1; }
  .arrow:disabled{ opacity:.3; }
  main{ padding:8px 24px 48px; }
  label.field{ display:block; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; margin:20px 0 10px; }
  .row{ display:flex; align-items:center; gap:14px; margin-top:14px; flex-wrap:wrap; }
  .note{ font-size:12.5px; color:var(--sub); margin-top:18px; line-height:1.5; }
  .ok{ font-size:13px; color:var(--sage); }
  .err{ font-size:13px; color:var(--accent); }
  .dot{ font-size:12px; color:var(--sage); }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// 배포한 구글 웹앱 URL을 여기에 넣어주세요 (.../exec 로 끝나는 주소)
var ENDPOINT = "https://script.google.com/macros/s/AKfycbyzeGcjaCHPA0U4q8Bs5h4ZgMmzfwiCnbcaGKKAnDJcww7WnfHVOWYNz180RueA2V3EiA/exec";
// 공용 비밀번호 (구글 스크립트와 똑같아야 함)
var PASSWORD = "mnhent0552!";

function pad(n){ return String(n).padStart(2,"0"); }
function toKey(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function todayKey(){ return toKey(new Date()); }
var WEEK = ["일","월","화","수","목","금","토"];
function fmtLong(key){
  var p = key.split("-").map(Number);
  var dt = new Date(p[0], p[1]-1, p[2]);
  return p[0]+"년 "+p[1]+"월 "+p[2]+"일 ("+WEEK[dt.getDay()]+")";
}
function shiftKey(key, days){
  var p = key.split("-").map(Number);
  var dt = new Date(p[0], p[1]-1, p[2]);
  dt.setDate(dt.getDate()+days);
  return toKey(dt);
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

var state = { unlocked:false, draftPw:"", pwError:false, name:"", draftName:"", viewDate:todayKey(), text:"", status:"idle" };
var app = document.getElementById("app");

function render(){
  if(!state.unlocked){ renderLock(); return; }
  if(!state.name){ renderGate(); return; }
  renderForm();
}

// 비밀번호 화면
function renderLock(){
  app.innerHTML =
    '<div class="gate">' +
      '<div class="eyebrow">사내 전용</div>' +
      '<h1 style="font-size:34px;margin:8px 0 6px">접속 비밀번호</h1>' +
      '<p class="lead" style="margin:0 0 24px">회사에서 공유받은 비밀번호를 입력하세요.</p>' +
      '<input id="pwInput" type="password" placeholder="비밀번호" value="'+esc(state.draftPw)+'" />' +
      (state.pwError ? '<p class="err" style="margin:10px 0 0">비밀번호가 올바르지 않습니다.</p>' : '') +
      '<button class="btn btn-block" id="unlockBtn">들어가기</button>' +
    '</div>';
  var input = document.getElementById("pwInput");
  var go = function(){
    if(input.value === PASSWORD){ state.unlocked = true; state.pwError = false; render(); }
    else { state.pwError = true; state.draftPw = ""; render(); }
  };
  input.addEventListener("input", function(e){ state.draftPw = e.target.value; });
  input.addEventListener("keydown", function(e){ if(e.key==="Enter") go(); });
  document.getElementById("unlockBtn").addEventListener("click", go);
  input.focus();
}

function renderGate(){
  app.innerHTML =
    '<div class="gate">' +
      '<div class="eyebrow">일일 업무 보고</div>' +
      '<h1 style="font-size:40px;margin:8px 0 6px">오늘, 무엇을 끝냈나요</h1>' +
      '<p class="lead" style="margin:0 0 28px">이름을 입력하고 그날의 중요한 업무를 기록하세요. 제출하면 구글 시트에 저장됩니다.</p>' +
      '<input id="nameInput" placeholder="이름 (예: 김지원)" value="'+esc(state.draftName)+'" />' +
      '<button class="btn btn-block" id="startBtn">시작하기</button>' +
    '</div>';
  var input = document.getElementById("nameInput");
  var go = function(){ var v = input.value.trim(); if(v){ state.name = v; state.text=""; state.status="idle"; render(); } };
  input.addEventListener("input", function(e){ state.draftName = e.target.value; });
  input.addEventListener("keydown", function(e){ if(e.key==="Enter") go(); });
  document.getElementById("startBtn").addEventListener("click", go);
  input.focus();
}

function renderForm(){
  var isToday = state.viewDate === todayKey();
  var isFuture = state.viewDate > todayKey();
  var body;
  if(isFuture){
    body = '<p style="color:var(--sub);font-size:14px">미래 날짜에는 작성할 수 없어요.</p>';
  } else {
    var okHtml  = state.status==="done"  ? '<span class="ok">✓ 시트에 저장됐어요</span>' : '';
    var errHtml = state.status==="error" ? '<span class="err">전송 실패 · 주소를 확인하세요</span>' : '';
    var btnLabel = state.status==="sending" ? "전송 중…" : "구글 시트로 제출";
    var disabled = (!state.text.trim() || state.status==="sending") ? "disabled" : "";
    body =
      '<textarea id="reportText" placeholder="· 진행한 일&#10;· 결과 / 진척&#10;· 막힌 점이나 공유할 사항">'+esc(state.text)+'</textarea>' +
      '<div class="row">' +
        '<button class="btn" id="submitBtn" '+disabled+'>'+btnLabel+'</button>' +
        okHtml + errHtml +
      '</div>' +
      '<p class="note">제출한 내용과 동료들의 기록은 연결된 <b>구글 시트</b>에서 확인하세요. 같은 날 다시 제출하면 시트의 기존 줄이 갱신됩니다.</p>';
  }
  app.innerHTML =
    '<header class="app">' +
      '<div><div class="eyebrow">일일 업무 보고</div><div class="hname">'+esc(state.name)+'님의 기록</div></div>' +
      '<div style="text-align:right"><div class="dot">● 시트 연결됨</div><button class="textbtn" id="changeName">이름 변경</button></div>' +
    '</header>' +
    '<div class="datebar">' +
      '<button class="arrow" id="prevDay">‹</button>' +
      '<div style="text-align:center"><div class="dlabel">'+fmtLong(state.viewDate)+'</div>' +
        (isToday ? '' : '<button class="textbtn" id="goToday">오늘로</button>') + '</div>' +
      '<button class="arrow" id="nextDay" '+(isToday?'disabled':'')+'>›</button>' +
    '</div>' +
    '<main><label class="field">오늘 한 중요한 업무</label>'+body+'</main>';

  document.getElementById("changeName").addEventListener("click", function(){ state.name=""; state.draftName=""; render(); });
  document.getElementById("prevDay").addEventListener("click", function(){ state.viewDate = shiftKey(state.viewDate,-1); state.text=""; state.status="idle"; render(); });
  var nextBtn = document.getElementById("nextDay");
  if(nextBtn) nextBtn.addEventListener("click", function(){ if(!isToday){ state.viewDate = shiftKey(state.viewDate,1); state.text=""; state.status="idle"; render(); } });
  var goToday = document.getElementById("goToday");
  if(goToday) goToday.addEventListener("click", function(){ state.viewDate = todayKey(); state.text=""; state.status="idle"; render(); });
  var ta = document.getElementById("reportText");
  if(ta){
    ta.addEventListener("input", function(e){
      state.text = e.target.value;
      var btn = document.getElementById("submitBtn");
      if(btn) btn.disabled = (!state.text.trim() || state.status==="sending");
    });
  }
  var submitBtn = document.getElementById("submitBtn");
  if(submitBtn) submitBtn.addEventListener("click", submit);
}

function submit(){
  var t = state.text.trim();
  if(!t) return;
  state.status = "sending";
  render();
  fetch(ENDPOINT, {
    method:"POST",
    mode:"no-cors",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({ password: PASSWORD, name: state.name, date: state.viewDate, text: t })
  }).then(function(){
    state.status = "done"; state.text = ""; render();
  }).catch(function(e){
    console.error(e); state.status = "error"; render();
  });
}

render();
</script>
</body>
</html>
